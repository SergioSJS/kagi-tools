name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: .venv
        key: ${{ runner.os }}-venv-${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-venv-${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        uv venv --clear
        uv pip install -r requirements.txt
        uv pip install pytest pytest-cov pytest-mock responses black ruff
        uv pip install -e .

    - name: Lint with Ruff
      run: |
        .venv/bin/ruff check .

    - name: Format check with Black
      run: |
        .venv/bin/black --check .

    - name: Run tests
      env:
        KAGI_SESSION_URL: "https://kagi.com/search?token=test_token_for_ci"
      run: |
        .venv/bin/pytest tests/ -v --cov=. --cov-report=term-missing
